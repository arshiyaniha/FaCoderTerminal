<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FaCoderTerminal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="titlebar">
      <div class="window-buttons" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="tabs" dir="ltr">
        <button class="tab active">PowerShell</button>
        <button class="tab">FaCoder</button>
        <button class="tab muted">+</button>
      </div>
      <div class="brand">FaCoderTerminal</div>
    </header>

    <main class="workspace">
      <section class="side-panel">
        <div class="panel-card">
          <h2>دستور فارسی</h2>
          <textarea id="requestInput" placeholder="مثلاً: وضعیت گیت پروژه را بررسی کن"></textarea>
          <label class="label">مسیر پروژه</label>
          <input id="projectPath" dir="ltr" placeholder="E:\\project\\path" />
          <div class="actions-row">
            <button id="parseBtn" class="primary">تشخیص</button>
            <button id="runBtn" class="accent" disabled>اجرا</button>
          </div>
        </div>

        <div class="panel-card settings-card">
          <h2>تنظیمات LLM</h2>
          <label class="label">Base URL</label>
          <input id="baseUrl" dir="ltr" placeholder="https://api.example.com/v1" />
          <label class="label">API Key</label>
          <input id="apiKey" dir="ltr" type="password" placeholder="sk-..." />
          <label class="label">Model</label>
          <input id="modelName" dir="ltr" placeholder="model-name" />
          <label class="check"><input id="llmEnabled" type="checkbox" /> فعال‌سازی LLM</label>
          <div class="actions-row">
            <button id="saveSettingsBtn">ذخیره</button>
            <button id="testLlmBtn">تست</button>
          </div>
        </div>

        <div class="panel-card command-list">
          <h2>دستورهای شناخته‌شده</h2>
          <div id="commandsList"></div>
        </div>
      </section>

      <section class="terminal-panel" dir="ltr">
        <div class="terminal-toolbar">
          <div class="crumb">PS <span id="cwdLabel">.</span></div>
          <div id="statusPill" class="status-pill">Ready</div>
        </div>
        <pre id="output" class="terminal-output"></pre>
        <div class="preview" dir="rtl">
          <div class="preview-title">پیشنهاد اجرا</div>
          <div id="planBox" class="plan-box">هنوز دستوری تشخیص داده نشده است.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="confirmModal" class="modal hidden" dir="rtl">
    <div class="modal-card">
      <h2>تأیید اجرا</h2>
      <p id="confirmText"></p>
      <pre id="confirmCommand" dir="ltr"></pre>
      <div class="actions-row end">
        <button id="cancelConfirm">لغو</button>
        <button id="acceptConfirm" class="danger">اجرا کن</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
