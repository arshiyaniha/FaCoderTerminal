<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Persian PowerShell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="window">
    <header class="bar">
      <div class="title" dir="ltr">Simple Persian PowerShell</div>
      <div class="actions">
        <button id="openFolderBtn" title="انتخاب پوشه">📁 پوشه</button>
        <button id="copyAllBtn">کپی کامل</button>
        <button id="copyLast50Btn">۵۰ خط آخر</button>
        <button id="copyLast3Btn">۳ دستور آخر</button>
        <button id="restartBtn">شروع دوباره</button>
        <span id="status">Loading</span>
      </div>
    </header>
    <main id="terminal"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
